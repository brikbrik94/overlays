    <!-- EINHEITLICHER PIN + ORIGINAL user-doctor PATH -->
    <g id="pin-user-doctor">
      <path d="M32 6
               C20 6 10 16 10 28
               C10 44 32 70 32 70
               C32 70 54 44 54 28
               C54 16 44 6 32 6 Z"
            fill="var(--fill)" stroke="#111" stroke-width="2" />

